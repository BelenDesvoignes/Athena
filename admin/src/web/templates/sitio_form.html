{% extends "base_layout.html" %}
{% block content %}
<h2>{{ sitio.id and "Editar Sitio" or "Nuevo Sitio" }}</h2>
<form method="post">
    <label>Nombre:</label>
    <input type="text" name="nombre" value="{{ sitio.nombre or '' }}" required><br>

    <label>Descripción breve:</label>
    <input type="text" name="descripcion_breve" value="{{ sitio.descripcion_breve or '' }}" required><br>

    <label>Descripción completa:</label>
    <textarea name="descripcion_completa" required>{{ sitio.descripcion_completa or '' }}</textarea><br>

    <label>Ciudad:</label>
    <input type="text" name="ciudad" value="{{ sitio.ciudad or '' }}" required><br>

    <label>Provincia:</label>
    <input type="text" name="provincia" value="{{ sitio.provincia or '' }}" required><br>


    <label>Estado de conservación:</label>
    <select name="estado_conservacion" required>
        <option value="Bueno" {% if sitio.estado_conservacion == "Bueno" %}selected{% endif %}>Bueno</option>
        <option value="Regular" {% if sitio.estado_conservacion == "Regular" %}selected{% endif %}>Regular</option>
        <option value="Malo" {% if sitio.estado_conservacion == "Malo" %}selected{% endif %}>Malo</option>
    </select><br>

    <label>Año de inauguración:</label>
    <input type="number" name="inauguracion" value="{{ sitio.inauguracion or '' }}" required><br>

    <label>Categoría:</label>
    <input type="text" name="categoria" value="{{ sitio.categoria or '' }}" required><br>

    <label>Visible:</label>
    <input type="checkbox" name="visible" value="1" {% if sitio.visible %}checked{% endif %}><br>

    <button type="submit">Guardar</button>
</form>
{% if error %}
    <p style="color:red;">{{ error }}</p>
{% endif %}
{% endblock %}
