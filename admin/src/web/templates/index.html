<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Tu Aplicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* CSS para replicar el fondo oscuro y centrar el contenido verticalmente */
        body {
            background-color: #212529 !important; /* Color bg-dark de Bootstrap */
            color: #fff; /* Color de texto claro */
            display: flex;
            justify-content: center; /* Centrado horizontal */
            align-items: center; /* Centrado vertical */
            min-height: 100vh; /* Ocupa toda la altura de la vista */
            margin: 0;
        }
        .main-content {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div class="main-content text-center">
        <img src="{{ url_for('static', filename='images/athena_logo.png') }}" 
             alt="Logo de la Aplicación" 
             class="img-fluid mb-4" 
             style="max-height: 250px; width: auto;">
        
        <h1 class="display-4 mb-3">Bienvenido a <span class="text-secondary">Athena</span></h1>
        
        <p class="lead text-white-50">
            La solución para la gestión de usuarios y administración de permisos.
        </p>
        
        <div class="mt-4">
            <a href="{{ url_for('user_admin.register') }}" class="btn btn-secondary btn-lg mx-2">Regístrate</a>
            
            <a href="{{ url_for('user_admin.login') }}" class="btn btn-outline-secondary btn-lg mx-2">Iniciar Sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
