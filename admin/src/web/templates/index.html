<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio - Tu Aplicación</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ============================== */
        /* Estilos del Spline (el Fondo) */
        /* ============================== */
        #spline-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1; /* CLAVE: Lo envía al fondo */
        }
        
        #spline-background iframe {
            display: block;
        }

        /* ============================== */
        /* Estilos del Contenido Principal */
        /* ============================== */
        body {
            background-color: #212529; 
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative; 
            z-index: 1; 
        }
        .main-content {
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="spline-background">
        <iframe src='https://my.spline.design/glowingplanetparticles-y1lGkqJARNxH1k0XN7xYtNWY/' frameborder='0' width='100%' height='100%'></iframe>
    </div>
    
    <div class="main-content text-center">
        
        <h1 class="display-4 mb-3">Bienvenido a <span class="text-secondary">Athena</span></h1>
        
        <p class="lead text-white-50">
            La solución para la gestión de usuarios y administración de permisos.
        </p>
        
        <div class="mt-4">
            <a href="{{ url_for('user_admin.register') }}" class="btn btn-secondary btn-lg mx-2">Regístrate</a>
            
            <a href="{{ url_for('user_admin.login') }}" class="btn btn-outline-secondary btn-lg mx-2">Iniciar Sesión</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
