<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Autenticación{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* (MANTENEMOS los estilos de fondo del spline y generales del body) */
        /* ============================== */
        /* Estilos del Spline (el Fondo) */
        /* ============================== */
        #spline-background {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw; 
            height: 100vh; 
            z-index: -2; 
        }
        
        #spline-background iframe {
            display: block;
        }

        /* ============================== */
        /* Estilos generales para el layout */
        /* ============================== */
        body {
            background-color: transparent !important; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #fff; 
        }
        
        /* El header y footer necesitan fondos semi-transparentes */
        header, footer {
            background-color: rgba(33, 37, 41, 0.8) !important;
            position: relative; 
            z-index: 1;
        }

        /* Estilo para el logo y el nombre en la barra de navegación */
        .navbar-brand .athena-name {
            font-size: 2rem;
            font-weight: bold;
        }

        /* Footer */
        footer {
            margin-top: auto;
            text-align: center;
        }
        .footer-text {
            font-size: 0.8rem;
        }

        /* IMPORTANTE: El main-content sin barra lateral */
        .main-content {
            flex-grow: 1;
            /* Fondo semi-transparente para el área de contenido */
            background-color: rgba(33, 37, 41, 0.7); 
            padding-top: 20px; /* Un poco de espacio arriba */
        }
    </style>
</head>
<body>
    
    <div id="spline-background">
        <iframe src='https://my.spline.design/glowingplanetparticles-y1lGkqJARNxH1k0XN7xYtNWY/' frameborder='0' width='100%' height='100%'></iframe>
    </div>
    
    <header class="navbar navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-light" href="#">
                <span class="athena-name">Athena Admin</span>
            </a>
            <span class="text-light">
                <a class="btn btn-sm btn-outline-light me-2" href="{{ url_for('user_admin.login') }}">Iniciar Sesión</a>
                <a class="btn btn-sm btn-outline-success" href="{{ url_for('user_admin.register') }}">Registrarse</a>
            </span>
        </div>
    </header>
    
    <div class="main-content">
        {% block content %}{% endblock %}
    </div>
    
    <footer class="py-3">
        <div class="container text-center">
            <span class="text-light footer-text">&copy; 2025 Proyecto de Software 2025</span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
