<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Autenticación - Athena{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        #spline-background {
            position: fixed; 
            top: 0;
            left: 0;
            width: 100vw; 
            height: 100vh; 
            z-index: -2; 
        }
        
        #spline-background iframe {
            display: block;
        }

        body {
            background-color: transparent !important; 
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #fff; 
        }
        
        header, footer {
            background-color: rgba(33, 37, 41, 0.8) !important;
            position: relative; 
            z-index: 1;
        }

        .navbar-brand .athena-name {
            font-size: 2rem;
            font-weight: bold;
        }

        footer {
            margin-top: auto;
            text-align: center;
        }
        .footer-text {
            font-size: 0.8rem;
        }

        .main-content {
            flex-grow: 1;
            background-color: rgba(33, 37, 41, 0.7); 
            padding-top: 20px; 
        }
    </style>
</head>
<body>
    
    <div id="spline-background" aria-hidden="true">
        <iframe src='https://my.spline.design/glowingplanetparticles-y1lGkqJARNxH1k0XN7xYtNWY/' frameborder='0' width='100%' height='100%' title="Fondo 3D animado"></iframe>
    </div>
    
    <header class="navbar navbar-dark" role="banner">
        <div class="container-fluid">
            <a class="navbar-brand text-light" href="#">
                <h1><span class="athena-name">Athena</span></h1>
            </a>
            
            <nav aria-label="Navegación de autenticación">
                <a class="btn btn-sm btn-outline-light me-2" href="{{ url_for('user_admin.login') }}">Iniciar Sesión</a>
                <a class="btn btn-sm btn-outline-success" href="{{ url_for('user_admin.register') }}">Registrarse</a>
            </nav>
        </div>
    </header>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="py-3">
        <div class="container text-center">
            <p class="text-light footer-text mb-0"><small>&copy; 2025 Proyecto de Software 2025</small></p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
