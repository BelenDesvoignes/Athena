{% extends 'base_layout.html' %}
{% block content %}
<h1>Usuarios</h1>

<a href="{{ url_for('user_admin.new') }}" class="btn btn-primary">Nuevo Usuario</a>

<form method="get" class="mt-3">
    <input type="text" name="email" placeholder="Buscar por email" value="{{ request.args.get('email', '') }}">
    <select name="enabled">
        <option value="">Todos</option>
        <option value="True" {% if request.args.get('enabled')=='True' %}selected{% endif %}>Activo</option>
        <option value="False" {% if request.args.get('enabled')=='False' %}selected{% endif %}>Bloqueado</option>
    </select>
    <button type="submit">Filtrar</button>
</form>

<table class="table mt-3">
    <thead>
        <tr>
            <th>Email</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Rol</th>
            <th>Bloqueado</th>
        </tr>
    </thead>
    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.email }}</td>
            <td>{{ u.nombre }}</td>
            <td>{{ u.apellido }}</td>
            <td>{{ u.role.name }}</td>
            <td>{{ 'Sí' if u.enabled else 'No' }}</td>
            <td>
                <a href="{{ url_for('user_admin.edit', user_id=u.id) }}" class="btn btn-sm btn-warning">Editar</a>
                <form action="{{ url_for('user_admin.delete', user_id=u.id) }}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger">Eliminar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
