{% extends 'base_layout.html' %}

{% block content %}
<h1>{% if user %}Editar{% else %}Nuevo{% endif %} Usuario</h1>

<form method="post">
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required value="{{ user.email if user else '' }}">
    </div>

    <div class="mb-3">
        <label for="nombre" class="form-label">Nombre</label>
        <input type="text" class="form-control" id="nombre" name="nombre" required value="{{ user.nombre if user else '' }}">
    </div>

    <div class="mb-3">
        <label for="apellido" class="form-label">Apellido</label>
        <input type="text" class="form-control" id="apellido" name="apellido" required value="{{ user.apellido if user else '' }}">
    </div>

    <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" name="password" {% if not user %}required{% endif %}>
        {% if user %}<small class="form-text text-muted">Dejar vacío si no desea cambiar la contraseña.</small>{% endif %}
    </div>

    <div class="form-check mb-3">
        <input type="checkbox" class="form-check-input" id="activo" name="activo" {% if user and user.enabled %}checked{% endif %}>
        <label class="form-check-label" for="activo">Activo</label>
    </div>

    <button type="submit" class="btn btn-primary">{% if user %}Actualizar{% else %}Crear{% endif %}</button>
    <a href="{{ url_for('user_admin.home') }}" class="btn btn-secondary">Cancelar</a>
</form>

{% endblock %}
