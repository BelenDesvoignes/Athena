<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Panel de Administración{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* Estilos generales para el layout */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex-grow: 1;
        }

        /* Estilo para los enlaces del menú lateral */
        #sidebarMenu .nav-link {
            color: #ccc !important; /* Gris claro */
        }
        #sidebarMenu .nav-link:hover,
        #sidebarMenu .nav-link:focus {
            color: #ccc !important;
            background-color: #333a3d; /* Gris oscuro para el hover */
        }

        /* Estilo para el logo y el nombre en la barra de navegación */
        .navbar-brand .logo {
            height: 60px;
            width: auto;
            margin-right: 15px;
            vertical-align: middle;
            filter: invert(100%);
        }
        .navbar-brand .athena-name {
            font-size: 2rem;
            font-weight: bold;
        }

        /* Estilo unificado para las líneas (horizontal y vertical) */
        .divider {
            border-color: #555 !important; /* Un gris más claro para las líneas */
            border-style: solid;
        }
        .divider.horizontal {
            border-width: 2px 0 0 0;
        }
        .divider.vertical {
            border-width: 0 1px 0 0;
            height: 100%;
            position: absolute;
            top: 0;
            right: 0;
            z-index: 1000;
        }

        /* Ajustes para el contenedor principal y la barra lateral */
        .main-container {
            display: flex;
            flex-grow: 1;
        }
        .sidebar {
            position: relative;
        }
        .sidebar-content {
            padding-right: 15px;
        }

        /* Footer */
        footer {
            margin-top: auto;
            text-align: center;
        }
        .footer-text {
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="bg-dark text-light">
    <header class="navbar navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-light" href="#">
                <img src="{{ url_for('static', filename='images/athena_logo.png') }}" alt="Logo Athena" class="logo">
            </a>
            <div class="dropdown">
                <button class="btn btn-dark dropdown-toggle text-light" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    {% if g.user %}{{ g.user.nombre }}{% else %}Cuenta{% endif %}
                </button>
                <ul class="dropdown-menu dropdown-menu-dark">
                    <li><a class="dropdown-item text-light" href="#">Ver perfil</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item text-light" href="#">Cerrar sesión</a></li>
                </ul>
            </div>
        </div>
    </header>
    
    <div class="divider horizontal"></div>
    
    <div class="container-fluid main-container">
        <div class="row w-100">
            <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-sidebar sidebar">
                <div class="position-sticky pt-3 sidebar-content">
                    <ul class="nav flex-column">
                        <li class="nav-item"><a class="nav-link text-light" href="#">Gestión de sitios históricos</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="#">Validación de propuestas</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="#">Moderación de reseñas</a></li>
                        <li class="nav-item"><a class="nav-link text-light" href="#">Gestión de usuarios</a></li>
                    </ul>
                </div>
                <div class="divider vertical"></div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 text-light">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    
    <footer class="bg-dark py-3">
        <div class="container text-center">
            <span class="text-light footer-text">&copy; 2025 Proyecto de Software 2025</span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
