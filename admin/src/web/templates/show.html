{% extends 'base_layout.html' %}
{% block content %}
<h1>Detalle de Usuario</h1>

<p><strong>Email:</strong> {{ user.email }}</p>
<p><strong>Nombre:</strong> {{ user.nombre }}</p>
<p><strong>Apellido:</strong> {{ user.apellido }}</p>
<p><strong>Activo:</strong> {{ 'Sí' if user.enabled else 'No' }}</p>

<a href="{{ url_for('user_admin.edit', user_id=user.id) }}" class="btn btn-warning">Editar</a>
<a href="{{ url_for('admin.home') }}" class="btn btn-secondary">Volver</a>
{% endblock %}
